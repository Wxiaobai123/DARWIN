<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DARWIN Public Dashboard</title>
  <meta name="description" content="DARWIN public dashboard demo">
  <meta http-equiv="refresh" content="0; url=./dashboard.html?demo=1">
  <script>
    location.replace('./dashboard.html?demo=1')
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0e17;
      --border: rgba(255,255,255,0.1);
      --text: #e2e8f0;
      --dim: #94a3b8;
      --accent: #06b6d4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(6,182,212,0.10), transparent 28%),
        linear-gradient(180deg, #0a0e17 0%, #111827 100%);
      color: var(--text);
    }
    .card {
      width: min(560px, 100%);
      padding: 28px;
      border-radius: 18px;
      background: rgba(17,24,39,0.92);
      border: 1px solid var(--border);
      box-shadow: 0 18px 60px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.1;
      color: var(--accent);
    }
    p {
      margin: 0 0 14px;
      color: var(--dim);
      line-height: 1.75;
      font-size: 15px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>DARWIN</h1>
    <p>正在跳转到公开可交互的只读 Dashboard Demo。</p>
    <p>如果没有自动跳转，请点击：<a href="./dashboard.html?demo=1">打开公开 Dashboard</a></p>
    <p>产品介绍页保留在：<a href="./landing.html">landing.html</a></p>
  </div>
</body>
</html>
