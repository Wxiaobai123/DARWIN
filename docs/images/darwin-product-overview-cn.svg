  <text x="800" y="132" text-anchor="middle" fill="url(#hero)" font-size="72" font-weight="800" font-family="Inter, Arial, sans-serif">DARWIN</text>
  <text x="800" y="176" text-anchor="middle" fill="#CBD5E1" font-size="26" font-weight="600" font-family="Inter, Arial, sans-serif">本地优先、风险优先的 AI 交易治理系统</text>
  <text x="800" y="214" text-anchor="middle" fill="#94A3B8" font-size="20" font-family="Inter, Arial, sans-serif">统一市场识别、策略选择、真实执行、风险控制与审计记录</text>

  <rect x="110" y="280" width="330" height="206" rx="22" fill="#111827" stroke="#1E293B"/>
  <text x="140" y="324" fill="#22D3EE" font-size="20" font-weight="700" font-family="Inter, Arial, sans-serif">1. 用户意图与控制</text>
  <text x="140" y="360" fill="#F8FAFC" font-size="34" font-weight="700" font-family="Inter, Arial, sans-serif">目标先行</text>
  <text x="140" y="396" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">风险等级、币种白名单、审批操作</text>
  <text x="140" y="432" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">都由用户明确控制。</text>
  <rect x="140" y="452" width="112" height="28" rx="14" fill="#083344"/>
  <text x="196" y="471" text-anchor="middle" fill="#67E8F9" font-size="14" font-weight="700" font-family="Inter, Arial, sans-serif">可解释输入</text>

  <rect x="470" y="280" width="330" height="206" rx="22" fill="#111827" stroke="#1E293B"/>
  <text x="500" y="324" fill="#F59E0B" font-size="20" font-weight="700" font-family="Inter, Arial, sans-serif">2. 治理层</text>
  <text x="500" y="360" fill="#F8FAFC" font-size="34" font-weight="700" font-family="Inter, Arial, sans-serif">治理中枢</text>
  <text x="500" y="396" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">5 个 Paperclip 智能体分工负责</text>
  <text x="500" y="432" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">市场、风控、CTO、策略、审计。</text>
  <rect x="500" y="452" width="138" height="28" rx="14" fill="#3F2A00"/>
  <text x="569" y="471" text-anchor="middle" fill="#FCD34D" font-size="14" font-weight="700" font-family="Inter, Arial, sans-serif">多智能体治理</text>

  <rect x="830" y="280" width="330" height="206" rx="22" fill="#111827" stroke="#1E293B"/>
  <text x="860" y="324" fill="#4ADE80" font-size="20" font-weight="700" font-family="Inter, Arial, sans-serif">3. 执行层</text>
  <text x="860" y="360" fill="#F8FAFC" font-size="34" font-weight="700" font-family="Inter, Arial, sans-serif">真实连接 OKX</text>
  <text x="860" y="396" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">行情、账户、现货、合约、Bot、算法单</text>
  <text x="860" y="432" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">都走 OKX Agent Trade Kit。</text>
  <rect x="860" y="452" width="128" height="28" rx="14" fill="#052E16"/>
  <text x="924" y="471" text-anchor="middle" fill="#86EFAC" font-size="14" font-weight="700" font-family="Inter, Arial, sans-serif">真实执行闭环</text>

  <rect x="1190" y="280" width="300" height="206" rx="22" fill="#111827" stroke="#1E293B"/>
  <text x="1220" y="324" fill="#C084FC" font-size="20" font-weight="700" font-family="Inter, Arial, sans-serif">4. 结果层</text>
  <text x="1220" y="360" fill="#F8FAFC" font-size="34" font-weight="700" font-family="Inter, Arial, sans-serif">有风控也有审计</text>
  <text x="1220" y="396" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">四级熔断、审批恢复、每日报告、</text>
  <text x="1220" y="432" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">把结果留在同一条责任链上。</text>
  <rect x="1220" y="452" width="144" height="28" rx="14" fill="#3B0764"/>
  <text x="1292" y="471" text-anchor="middle" fill="#D8B4FE" font-size="14" font-weight="700" font-family="Inter, Arial, sans-serif">可审计治理</text>

