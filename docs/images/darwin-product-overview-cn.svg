  <text x="310" y="644" text-anchor="middle" fill="#CBD5E1" font-size="15" font-family="Inter, Arial, sans-serif">震荡 / 趋势 / 极端</text>

  <text x="546" y="614" text-anchor="middle" fill="#C4B5FD" font-size="18" font-weight="700" font-family="Inter, Arial, sans-serif">策略治理</text>
  <text x="546" y="644" text-anchor="middle" fill="#CBD5E1" font-size="15" font-family="Inter, Arial, sans-serif">影子验证 → 晋升 / 降级</text>

  <text x="782" y="614" text-anchor="middle" fill="#86EFAC" font-size="18" font-weight="700" font-family="Inter, Arial, sans-serif">资金分配</text>
  <text x="782" y="644" text-anchor="middle" fill="#CBD5E1" font-size="15" font-family="Inter, Arial, sans-serif">加权评分 + 波动率 / 相关性折扣</text>

  <text x="1018" y="614" text-anchor="middle" fill="#FDBA74" font-size="18" font-weight="700" font-family="Inter, Arial, sans-serif">OKX 执行</text>
  <text x="1018" y="644" text-anchor="middle" fill="#CBD5E1" font-size="15" font-family="Inter, Arial, sans-serif">现货 / 合约 / Bot / Algo</text>

  <text x="1254" y="614" text-anchor="middle" fill="#D8B4FE" font-size="18" font-weight="700" font-family="Inter, Arial, sans-serif">风控与审计</text>
  <text x="1254" y="644" text-anchor="middle" fill="#CBD5E1" font-size="15" font-family="Inter, Arial, sans-serif">四级熔断 + 日报 + 审批恢复</text>

  <path d="M400 624H456" stroke="#475569" stroke-width="2"/>
  <path d="M636 624H692" stroke="#475569" stroke-width="2"/>
  <path d="M872 624H928" stroke="#475569" stroke-width="2"/>
  <path d="M1108 624H1164" stroke="#475569" stroke-width="2"/>

  <text x="120" y="742" fill="#E2E8F0" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">为什么它比普通交易 Bot 更强</text>

  <rect x="120" y="772" width="430" height="150" rx="22" fill="#111827" stroke="#1E293B"/>
  <text x="150" y="812" fill="#F8FAFC" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">治理，而不是只会执行</text>
  <text x="150" y="850" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">DARWIN 不只“给信号”，而是决定应该用什么策略、</text>
  <text x="150" y="880" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">投入多少资金、什么时候暂停，以及何时恢复。</text>

  <rect x="585" y="772" width="430" height="150" rx="22" fill="#111827" stroke="#1E293B"/>
  <text x="615" y="812" fill="#F8FAFC" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">风险优先，而不是收益口号</text>
  <text x="615" y="850" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">四层熔断、审批恢复、风险等级切换和审计链路，</text>
  <text x="615" y="880" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">让系统更接近可持续运行的治理平台，而不是临时演示。</text>

  <rect x="1050" y="772" width="430" height="150" rx="22" fill="#111827" stroke="#1E293B"/>
  <text x="1080" y="812" fill="#F8FAFC" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">本地优先，而不是黑盒托管</text>
  <text x="1080" y="850" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">密钥留在本地，Dashboard、Bridge、SQLite、</text>
  <text x="1080" y="880" fill="#94A3B8" font-size="18" font-family="Inter, Arial, sans-serif">Paperclip 与 OKX ATK 构成可复制的独立产品栈。</text>

