  <text x="880" y="1000" fill="#64748B" font-size="18" font-family="Inter, Arial, sans-serif">·</text>
  <text x="905" y="1000" fill="#E2E8F0" font-size="18" font-family="Inter, Arial, sans-serif">Node.js 22</text>
  <text x="1033" y="1000" fill="#64748B" font-size="18" font-family="Inter, Arial, sans-serif">·</text>
  <text x="1058" y="1000" fill="#E2E8F0" font-size="18" font-family="Inter, Arial, sans-serif">SQLite</text>
