<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#101B34"/>
    </linearGradient>
    <linearGradient id="title" x1="240" y1="0" x2="1240" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06B6D4"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="rail" x1="240" y1="0" x2="1360" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06B6D4"/>
      <stop offset="0.25" stop-color="#22C55E"/>
      <stop offset="0.5" stop-color="#EAB308"/>
      <stop offset="0.75" stop-color="#F97316"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="920" rx="32" fill="url(#bg)"/>
  <circle cx="1330" cy="150" r="180" fill="#06B6D4" fill-opacity="0.08"/>
  <circle cx="240" cy="770" r="220" fill="#A855F7" fill-opacity="0.08"/>
  <circle cx="1440" cy="760" r="140" fill="#22C55E" fill-opacity="0.06"/>

  <text x="120" y="92" fill="url(#title)" font-size="48" font-weight="800" font-family="Arial, sans-serif">DARWIN Product Value Map</text>
  <text x="120" y="132" fill="#9FB0C9" font-size="22" font-family="Arial, sans-serif">Not a bot that spits out entries, but a governance rail spanning interpretation, execution, protection, and audit.</text>

  <rect x="120" y="170" width="1360" height="88" rx="24" fill="#0F1A31" stroke="#1E3258"/>
  <text x="150" y="218" fill="#E2E8F0" font-size="26" font-weight="700" font-family="Arial, sans-serif">User Input</text>
  <text x="150" y="246" fill="#93A4BF" font-size="18" font-family="Arial, sans-serif">Risk tier · coin whitelist · operating constraints</text>
  <text x="1080" y="218" fill="#E2E8F0" font-size="26" font-weight="700" font-family="Arial, sans-serif">System Outcome</text>
  <text x="1080" y="246" fill="#93A4BF" font-size="18" font-family="Arial, sans-serif">More disciplined execution, clearer risk limits, and an auditable trail</text>

  <path d="M240 356H1360" stroke="url(#rail)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="240" cy="356" r="12" fill="#06B6D4"/>
  <circle cx="520" cy="356" r="12" fill="#22C55E"/>
  <circle cx="800" cy="356" r="12" fill="#EAB308"/>
  <circle cx="1080" cy="356" r="12" fill="#F97316"/>
  <circle cx="1360" cy="356" r="12" fill="#EF4444"/>

  <g filter="url(#shadow)">
    <rect x="120" y="396" width="240" height="220" rx="24" fill="#0F1A31" stroke="#15455A"/>
    <text x="150" y="446" fill="#06B6D4" font-size="26" font-weight="800" font-family="Arial, sans-serif">1. Intent Bounds</text>
    <text x="150" y="482" fill="#E2E8F0" font-size="20" font-weight="700" font-family="Arial, sans-serif">A local-first control plane</text>
    <text x="150" y="520" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• User defines posture, not every trade</text>
    <text x="150" y="550" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• Keys stay on the machine</text>
    <text x="150" y="580" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• Decisions are not outsourced to a black box</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="400" y="396" width="240" height="220" rx="24" fill="#0F1A31" stroke="#1A5C42"/>
    <text x="430" y="446" fill="#22C55E" font-size="26" font-weight="800" font-family="Arial, sans-serif">2. Regime Detection</text>
    <text x="430" y="482" fill="#E2E8F0" font-size="20" font-weight="700" font-family="Arial, sans-serif">Interpret before acting</text>
    <text x="430" y="520" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• ATR / funding / volume / long-short</text>
    <text x="430" y="550" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• Oscillation / trend / extreme states</text>
    <text x="430" y="580" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• 3-confirmation buffer against churn</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="680" y="396" width="240" height="220" rx="24" fill="#0F1A31" stroke="#6C5A12"/>
    <text x="710" y="446" fill="#EAB308" font-size="26" font-weight="800" font-family="Arial, sans-serif">3. Strategy Governance</text>
    <text x="710" y="482" fill="#E2E8F0" font-size="20" font-weight="700" font-family="Arial, sans-serif">Not a fixed bot on loop</text>
    <text x="710" y="520" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• Shadow → live promotion path</text>
    <text x="710" y="550" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• Weighted capital allocation</text>
    <text x="710" y="580" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• Losers demoted, winners scaled</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="960" y="396" width="240" height="220" rx="24" fill="#0F1A31" stroke="#7C3A0C"/>
    <text x="990" y="446" fill="#F97316" font-size="26" font-weight="800" font-family="Arial, sans-serif">4. OKX Execution Rail</text>
    <text x="990" y="482" fill="#E2E8F0" font-size="20" font-weight="700" font-family="Arial, sans-serif">ATK provides real capability</text>
    <text x="990" y="520" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• Market / account / positions</text>
    <text x="990" y="550" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• Spot / swap / bot / algo modules</text>
    <text x="990" y="580" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• Decisions become real trading actions</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1240" y="396" width="240" height="220" rx="24" fill="#0F1A31" stroke="#6E1F2A"/>
    <text x="1270" y="446" fill="#EF4444" font-size="26" font-weight="800" font-family="Arial, sans-serif">5. Risk and Audit</text>
    <text x="1270" y="482" fill="#E2E8F0" font-size="20" font-weight="700" font-family="Arial, sans-serif">Protect capital, then explain it</text>
    <text x="1270" y="520" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• Four breaker tiers, T1 - T4</text>
    <text x="1270" y="550" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• Paperclip approval gates</text>
    <text x="1270" y="580" fill="#9FB0C9" font-size="17" font-family="Arial, sans-serif">• Daily reports and traceable decisions</text>
  </g>

  <rect x="120" y="674" width="1360" height="170" rx="28" fill="#0F1A31" stroke="#1E3258"/>
  <text x="150" y="722" fill="#E2E8F0" font-size="28" font-weight="800" font-family="Arial, sans-serif">What makes DARWIN different from a normal trading bot</text>

  <rect x="150" y="748" width="400" height="64" rx="18" fill="#111F3A" stroke="#1B3A5B"/>
  <text x="178" y="786" fill="#06B6D4" font-size="20" font-weight="700" font-family="Arial, sans-serif">Normal bot: receives a signal and fires</text>

  <rect x="598" y="748" width="430" height="64" rx="18" fill="#111F3A" stroke="#214A3E"/>
  <text x="626" y="786" fill="#22C55E" font-size="20" font-weight="700" font-family="Arial, sans-serif">DARWIN: classify the market, choose the strategy, then execute</text>

  <rect x="1076" y="748" width="374" height="64" rx="18" fill="#111F3A" stroke="#5B2A41"/>
  <text x="1104" y="786" fill="#EAB308" font-size="20" font-weight="700" font-family="Arial, sans-serif">Then halt, explain, and review the outcome</text>
</svg>
