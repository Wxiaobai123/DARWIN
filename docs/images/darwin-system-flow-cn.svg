<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="80" x2="1460" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#06B6D4"/>
    </marker>
    <style>
      .title { fill: #E2E8F0; font: 800 42px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .subtitle { fill: #94A3B8; font: 500 18px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .section { fill: #F8FAFC; font: 700 22px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .label { fill: #E2E8F0; font: 700 18px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .body { fill: #94A3B8; font: 500 14px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .chip { fill: #020617; font: 700 15px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .small { fill: #CBD5E1; font: 600 13px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="960" rx="36" fill="url(#bg)"/>
  <g opacity="0.08">
    <path d="M120 120H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
    <path d="M120 300H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
    <path d="M120 520H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
    <path d="M120 760H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
  </g>

  <text x="120" y="92" class="title">DARWIN 系统决策主链路</text>
  <text x="120" y="126" class="subtitle">一个基于 OKX Agent Trade Kit 与 Paperclip AI 构建的本地优先、风险优先 AI 交易治理系统。</text>

  <rect x="120" y="162" width="1360" height="118" rx="28" fill="rgba(6,182,212,0.05)" stroke="rgba(6,182,212,0.18)"/>
  <text x="158" y="210" class="section">意图与控制层</text>
  <rect x="158" y="226" width="280" height="36" rx="18" fill="rgba(6,182,212,0.16)"/>
  <text x="190" y="250" class="chip">1. 设定目标、风控等级与币种白名单</text>
  <rect x="470" y="192" width="272" height="68" rx="18" fill="rgba(15,23,42,0.82)" stroke="rgba(255,255,255,0.10)"/>
  <text x="500" y="221" class="label">意图层</text>
  <text x="500" y="243" class="body">把自然语言目标转成系统运行目标。</text>
  <rect x="772" y="192" width="312" height="68" rx="18" fill="rgba(15,23,42,0.82)" stroke="rgba(255,255,255,0.10)"/>
  <text x="802" y="221" class="label">DARWIN 控制面板</text>
  <text x="802" y="243" class="body">提供观察、审批、熔断重置与状态控制。</text>
  <rect x="1114" y="192" width="328" height="68" rx="18" fill="rgba(15,23,42,0.82)" stroke="rgba(255,255,255,0.10)"/>
  <text x="1144" y="221" class="label">策略边界</text>
  <text x="1144" y="243" class="body">定义模式、风险约束、资金上限与人工审批门。</text>

  <g filter="url(#shadow)">
    <rect x="120" y="330" width="520" height="338" rx="28" fill="url(#panel)" stroke="rgba(168,85,247,0.20)"/>
    <text x="156" y="376" class="section">Paperclip 治理层</text>
    <text x="156" y="404" class="body">把市场感知、风控执行、组合姿态与日报审计拆分为独立智能体，职责清晰且互相制衡。</text>

    <rect x="156" y="440" width="144" height="88" rx="18" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.26)"/>
    <text x="184" y="475" class="label">市场分析师</text>
    <text x="184" y="498" class="body">15 分钟</text>
    <text x="184" y="518" class="body">输出市场状态证据</text>

    <rect x="318" y="440" width="144" height="88" rx="18" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.26)"/>
    <text x="354" y="475" class="label">风控代理</text>
    <text x="354" y="498" class="body">5 分钟</text>
    <text x="354" y="518" class="body">执行熔断门禁</text>

    <rect x="478" y="420" width="126" height="128" rx="20" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.30)"/>
    <text x="506" y="475" class="label">CTO 智能体</text>
    <text x="506" y="498" class="body">60 分钟</text>
    <text x="506" y="520" class="body">姿态与资金分配</text>

    <rect x="172" y="558" width="180" height="82" rx="18" fill="rgba(234,179,8,0.10)" stroke="rgba(234,179,8,0.26)"/>
    <text x="206" y="592" class="label">策略经理</text>
    <text x="206" y="615" class="body">晋升、降级、淘汰</text>

    <rect x="374" y="558" width="188" height="82" rx="18" fill="rgba(168,85,247,0.10)" stroke="rgba(168,85,247,0.26)"/>
    <text x="416" y="592" class="label">审计员</text>
    <text x="416" y="615" class="body">日报、记录与可追溯性</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="674" y="330" width="454" height="338" rx="28" fill="url(#panel)" stroke="rgba(6,182,212,0.20)"/>
    <text x="710" y="376" class="section">DARWIN 核心</text>
    <text x="710" y="404" class="body">这里把治理逻辑转成真实动作：状态识别、资金政策、熔断规则与策略记忆在同一层完成闭环。</text>

    <rect x="710" y="438" width="180" height="90" rx="18" fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.26)"/>
    <text x="742" y="474" class="label">状态识别器</text>
    <text x="742" y="497" class="body">震荡 / 趋势 / 极端</text>
    <text x="742" y="517" class="body">带确认缓冲</text>

    <rect x="908" y="438" width="184" height="90" rx="18" fill="rgba(6,182,212,0.10)" stroke="rgba(6,182,212,0.26)"/>
    <text x="938" y="474" class="label">资金分配器</text>
    <text x="938" y="497" class="body">加权评分 + 波动率</text>
    <text x="938" y="517" class="body">相关性折扣</text>

    <rect x="710" y="556" width="180" height="84" rx="18" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.26)"/>
    <text x="744" y="590" class="label">熔断器</text>
    <text x="744" y="613" class="body">T1 到 T4 硬门禁</text>

    <rect x="908" y="556" width="184" height="84" rx="18" fill="rgba(168,85,247,0.10)" stroke="rgba(168,85,247,0.26)"/>
    <text x="942" y="590" class="label">策略档案</text>
    <text x="942" y="613" class="body">模板、实例与历史</text>

    <rect x="792" y="640" width="214" height="40" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)"/>
    <text x="832" y="665" class="small">HTTP Bridge 连接前端、智能体与执行层</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1164" y="330" width="316" height="338" rx="28" fill="url(#panel)" stroke="rgba(34,197,94,0.20)"/>
    <text x="1200" y="376" class="section">OKX Agent Trade Kit</text>
    <text x="1200" y="404" class="body">真实账户状态与执行边界，密钥始终留在本地。</text>

    <rect x="1200" y="438" width="244" height="84" rx="18" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.26)"/>
    <text x="1228" y="472" class="label">市场数据</text>
    <text x="1228" y="495" class="body">K 线、深度、费率、持仓量</text>

    <rect x="1200" y="540" width="244" height="84" rx="18" fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.26)"/>
    <text x="1228" y="574" class="label">账户与持仓</text>
    <text x="1228" y="597" class="body">权益、余额、杠杆、库存</text>

    <rect x="1200" y="642" width="244" height="84" rx="18" fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.26)"/>
    <text x="1228" y="676" class="label">执行表面</text>
    <text x="1228" y="699" class="body">现货、合约、Bot、算法单与退出</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="734" width="1360" height="150" rx="28" fill="rgba(2,6,23,0.52)" stroke="rgba(255,255,255,0.08)"/>
    <text x="156" y="776" class="section">端到端运行闭环</text>
    <text x="156" y="804" class="body">DARWIN 的说服力来自“所有动作都留在同一条责任链上”，而不是把分析、执行、风控与报告拆散在不同工具里。</text>

    <rect x="156" y="826" width="184" height="34" rx="17" fill="rgba(6,182,212,0.16)"/><text x="192" y="848" class="chip">1. 感知市场</text>
    <rect x="360" y="826" width="206" height="34" rx="17" fill="rgba(59,130,246,0.16)"/><text x="396" y="848" class="chip">2. 识别状态</text>
    <rect x="586" y="826" width="230" height="34" rx="17" fill="rgba(168,85,247,0.16)"/><text x="622" y="848" class="chip">3. 分配组合姿态</text>
    <rect x="836" y="826" width="218" height="34" rx="17" fill="rgba(34,197,94,0.16)"/><text x="872" y="848" class="chip">4. 在 OKX 执行</text>
    <rect x="1074" y="826" width="188" height="34" rx="17" fill="rgba(239,68,68,0.16)"/><text x="1110" y="848" class="chip">5. 执行熔断</text>
    <rect x="1282" y="826" width="162" height="34" rx="17" fill="rgba(234,179,8,0.16)"/><text x="1318" y="848" class="chip">6. 输出审计</text>
  </g>

  <path d="M606 260V312" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M928 260V312" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1278 260V312" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M640 498H674" stroke="#A855F7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M604 484H674" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M640 600H710" stroke="#EF4444" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1128 482H1164" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1128 598H1164" stroke="#EF4444" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1322 522V734" stroke="#34D399" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M898 668V734" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M468 640V734" stroke="#A855F7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
