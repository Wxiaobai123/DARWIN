<svg width="1600" height="1040" viewBox="0 0 1600 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="80" x2="1460" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#06B6D4"/>
    </marker>
    <style>
      .title { fill: #E2E8F0; font: 800 42px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .subtitle { fill: #94A3B8; font: 500 16px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .section { fill: #F8FAFC; font: 700 22px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .label { fill: #E2E8F0; font: 700 18px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .body { fill: #94A3B8; font: 500 13px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .chip { fill: #020617; font: 700 14px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .small { fill: #CBD5E1; font: 600 12px Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="1040" rx="36" fill="url(#bg)"/>
  <g opacity="0.08">
    <path d="M120 120H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
    <path d="M120 300H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
    <path d="M120 520H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
    <path d="M120 760H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
    <path d="M120 840H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
  </g>

  <text x="120" y="92" class="title">DARWIN 系统决策主链路</text>
  <text x="120" y="124" class="subtitle">一个基于 OKX Agent Trade Kit 与 Paperclip AI 构建的本地优先、风险优先</text>
  <text x="120" y="148" class="subtitle">AI 交易治理系统。</text>

  <rect x="120" y="184" width="1360" height="136" rx="28" fill="rgba(6,182,212,0.05)" stroke="rgba(6,182,212,0.18)"/>
  <text x="158" y="232" class="section">意图与控制层</text>
  <rect x="158" y="246" width="320" height="40" rx="20" fill="rgba(6,182,212,0.16)"/>
  <text x="190" y="271" class="chip">1. 设定目标、风控等级与币种白名单</text>
  <rect x="500" y="208" width="260" height="78" rx="18" fill="rgba(15,23,42,0.82)" stroke="rgba(255,255,255,0.10)"/>
  <text x="530" y="239" class="label">意图层</text>
  <text x="530" y="261" class="body">把自然语言目标</text>
  <text x="530" y="280" class="body">转成系统运行目标。</text>
  <rect x="790" y="208" width="320" height="78" rx="18" fill="rgba(15,23,42,0.82)" stroke="rgba(255,255,255,0.10)"/>
  <text x="820" y="239" class="label">DARWIN 控制面板</text>
  <text x="820" y="261" class="body">提供观察、审批、</text>
  <text x="820" y="280" class="body">熔断重置与状态控制。</text>
  <rect x="1140" y="208" width="302" height="78" rx="18" fill="rgba(15,23,42,0.82)" stroke="rgba(255,255,255,0.10)"/>
  <text x="1170" y="239" class="label">策略边界</text>
  <text x="1170" y="261" class="body">定义模式、风险约束、资金上限</text>
  <text x="1170" y="280" class="body">与人工审批门。</text>

  <g filter="url(#shadow)">
    <rect x="120" y="360" width="520" height="362" rx="28" fill="url(#panel)" stroke="rgba(168,85,247,0.20)"/>
    <text x="156" y="406" class="section">Paperclip 治理层</text>
    <text x="156" y="434" class="body">把市场感知、风控执行、组合姿态与日报审计拆分为独立智能体，</text>
    <text x="156" y="454" class="body">职责清晰且互相制衡。</text>

    <rect x="156" y="486" width="144" height="88" rx="18" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.26)"/>
    <text x="184" y="521" class="label">市场分析师</text>
    <text x="184" y="544" class="body">15 分钟</text>
    <text x="184" y="564" class="body">输出市场状态证据</text>

    <rect x="318" y="486" width="144" height="88" rx="18" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.26)"/>
    <text x="354" y="521" class="label">风控代理</text>
    <text x="354" y="544" class="body">5 分钟</text>
    <text x="354" y="564" class="body">执行熔断门禁</text>

    <rect x="478" y="466" width="126" height="128" rx="20" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.30)"/>
    <text x="506" y="521" class="label">CTO 智能体</text>
    <text x="506" y="544" class="body">60 分钟</text>
    <text x="506" y="566" class="body">姿态与资金分配</text>

    <rect x="172" y="614" width="180" height="82" rx="18" fill="rgba(234,179,8,0.10)" stroke="rgba(234,179,8,0.26)"/>
    <text x="206" y="648" class="label">策略经理</text>
    <text x="206" y="671" class="body">晋升、降级、淘汰</text>

    <rect x="374" y="614" width="188" height="82" rx="18" fill="rgba(168,85,247,0.10)" stroke="rgba(168,85,247,0.26)"/>
    <text x="416" y="648" class="label">审计员</text>
    <text x="416" y="671" class="body">日报、记录与可追溯性</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="674" y="360" width="454" height="362" rx="28" fill="url(#panel)" stroke="rgba(6,182,212,0.20)"/>
    <text x="710" y="406" class="section">DARWIN 核心</text>
    <text x="710" y="434" class="body">这里把治理逻辑转成真实动作：状态识别、资金政策、</text>
    <text x="710" y="454" class="body">熔断规则与策略记忆在同一层完成闭环。</text>

    <rect x="710" y="484" width="180" height="90" rx="18" fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.26)"/>
    <text x="742" y="520" class="label">状态识别器</text>
    <text x="742" y="543" class="body">震荡 / 趋势 / 极端</text>
    <text x="742" y="563" class="body">带确认缓冲</text>

    <rect x="908" y="484" width="184" height="90" rx="18" fill="rgba(6,182,212,0.10)" stroke="rgba(6,182,212,0.26)"/>
    <text x="938" y="520" class="label">资金分配器</text>
    <text x="938" y="543" class="body">加权评分 + 波动率</text>
    <text x="938" y="563" class="body">相关性折扣</text>

    <rect x="710" y="604" width="180" height="84" rx="18" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.26)"/>
    <text x="744" y="638" class="label">熔断器</text>
    <text x="744" y="661" class="body">T1 到 T4 硬门禁</text>

    <rect x="908" y="604" width="184" height="84" rx="18" fill="rgba(168,85,247,0.10)" stroke="rgba(168,85,247,0.26)"/>
    <text x="942" y="638" class="label">策略档案</text>
    <text x="942" y="661" class="body">模板、实例与历史</text>

    <rect x="770" y="682" width="258" height="44" rx="22" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)"/>
    <text x="810" y="709" class="small">HTTP Bridge 连接前端、智能体与执行层</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1164" y="360" width="316" height="362" rx="28" fill="url(#panel)" stroke="rgba(34,197,94,0.20)"/>
    <text x="1200" y="406" class="section">OKX Agent Trade Kit</text>
    <text x="1200" y="434" class="body">真实账户状态与执行边界，</text>
    <text x="1200" y="454" class="body">密钥始终留在本地。</text>

    <rect x="1200" y="486" width="244" height="84" rx="18" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.26)"/>
    <text x="1228" y="520" class="label">市场数据</text>
    <text x="1228" y="543" class="body">K 线、深度、费率、持仓量</text>

    <rect x="1200" y="588" width="244" height="84" rx="18" fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.26)"/>
    <text x="1228" y="622" class="label">账户与持仓</text>
    <text x="1228" y="645" class="body">权益、余额、杠杆、库存</text>

    <rect x="1200" y="690" width="244" height="84" rx="18" fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.26)"/>
    <text x="1228" y="724" class="label">执行表面</text>
    <text x="1228" y="747" class="body">现货、合约、Bot、算法单与退出</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="812" width="1360" height="184" rx="28" fill="rgba(2,6,23,0.52)" stroke="rgba(255,255,255,0.08)"/>
    <text x="156" y="854" class="section">端到端运行闭环</text>
    <text x="156" y="882" class="body">DARWIN 的说服力来自“所有动作都留在同一条责任链上”，</text>
    <text x="156" y="902" class="body">而不是把分析、执行、风控与报告拆散在不同工具里。</text>

    <rect x="156" y="928" width="184" height="36" rx="18" fill="rgba(6,182,212,0.16)"/><text x="192" y="951" class="chip">1. 感知市场</text>
    <rect x="360" y="928" width="206" height="36" rx="18" fill="rgba(59,130,246,0.16)"/><text x="396" y="951" class="chip">2. 识别状态</text>
    <rect x="586" y="928" width="230" height="36" rx="18" fill="rgba(168,85,247,0.16)"/><text x="622" y="951" class="chip">3. 分配组合姿态</text>
    <rect x="836" y="928" width="218" height="36" rx="18" fill="rgba(34,197,94,0.16)"/><text x="872" y="951" class="chip">4. 在 OKX 执行</text>
    <rect x="1074" y="928" width="188" height="36" rx="18" fill="rgba(239,68,68,0.16)"/><text x="1110" y="951" class="chip">5. 执行熔断</text>
    <rect x="1282" y="928" width="162" height="36" rx="18" fill="rgba(234,179,8,0.16)"/><text x="1318" y="951" class="chip">6. 输出审计</text>
  </g>

  <path d="M630 286V342" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M950 286V342" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1290 286V342" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M604 530H674" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M640 656H710" stroke="#EF4444" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1128 530H1164" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1128 646H1164" stroke="#EF4444" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1322 778V812" stroke="#34D399" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M899 726V812" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M468 696V812" stroke="#A855F7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
