<svg width="1600" height="1040" viewBox="0 0 1600 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="80" x2="1460" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#06B6D4"/>
    </marker>
    <style>
      .title { fill: #E2E8F0; font: 800 42px Inter, "SF Pro Display", "Segoe UI", sans-serif; }
      .subtitle { fill: #94A3B8; font: 500 16px Inter, "SF Pro Display", "Segoe UI", sans-serif; }
      .section { fill: #F8FAFC; font: 700 22px Inter, "SF Pro Display", "Segoe UI", sans-serif; }
      .label { fill: #E2E8F0; font: 700 18px Inter, "SF Pro Display", "Segoe UI", sans-serif; }
      .body { fill: #94A3B8; font: 500 13px Inter, "SF Pro Display", "Segoe UI", sans-serif; }
      .chip { fill: #020617; font: 700 14px Inter, "SF Pro Display", "Segoe UI", sans-serif; }
      .small { fill: #CBD5E1; font: 600 12px Inter, "SF Pro Display", "Segoe UI", sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="1040" rx="36" fill="url(#bg)"/>
  <g opacity="0.08">
    <path d="M120 120H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
    <path d="M120 300H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
    <path d="M120 520H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
    <path d="M120 760H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
    <path d="M120 840H1480" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 8"/>
  </g>

  <text x="120" y="92" class="title">DARWIN Decision Rail</text>
  <text x="120" y="124" class="subtitle">A local-first, risk-first AI trading governance system built on</text>
  <text x="120" y="148" class="subtitle">OKX Agent Trade Kit and Paperclip AI.</text>

  <rect x="120" y="184" width="1360" height="136" rx="28" fill="rgba(6,182,212,0.05)" stroke="rgba(6,182,212,0.18)"/>
  <text x="158" y="232" class="section">Intent &amp; Control</text>
  <rect x="158" y="246" width="340" height="40" rx="20" fill="rgba(6,182,212,0.16)"/>
  <text x="186" y="271" class="chip">1. Set objective, risk tier, and asset whitelist</text>
  <rect x="520" y="208" width="260" height="78" rx="18" fill="rgba(15,23,42,0.82)" stroke="rgba(255,255,255,0.10)"/>
  <text x="548" y="239" class="label">Intent Layer</text>
  <text x="548" y="261" class="body">Turns natural-language goals into</text>
  <text x="548" y="280" class="body">an operating objective.</text>
  <rect x="804" y="208" width="308" height="78" rx="18" fill="rgba(15,23,42,0.82)" stroke="rgba(255,255,255,0.10)"/>
  <text x="832" y="239" class="label">DARWIN Dashboard</text>
  <text x="832" y="261" class="body">Operator surface for observability,</text>
  <text x="832" y="280" class="body">approvals, and resets.</text>
  <rect x="1138" y="208" width="304" height="78" rx="18" fill="rgba(15,23,42,0.82)" stroke="rgba(255,255,255,0.10)"/>
  <text x="1166" y="239" class="label">Policy Envelope</text>
  <text x="1166" y="261" class="body">Risk profile, mode selection, approval</text>
  <text x="1166" y="280" class="body">gates, and capital constraints.</text>

  <g filter="url(#shadow)">
    <rect x="120" y="360" width="520" height="362" rx="28" fill="url(#panel)" stroke="rgba(168,85,247,0.20)"/>
    <text x="156" y="406" class="section">Paperclip Governance Layer</text>
    <text x="156" y="434" class="body">Specialized agents separate market sensing, risk enforcement,</text>
    <text x="156" y="454" class="body">portfolio posture, and reporting.</text>

    <rect x="156" y="486" width="144" height="88" rx="18" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.26)"/>
    <text x="180" y="521" class="label">Market Analyst</text>
    <text x="180" y="544" class="body">15 min</text>
    <text x="180" y="564" class="body">Regime evidence</text>

    <rect x="318" y="486" width="144" height="88" rx="18" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.26)"/>
    <text x="348" y="521" class="label">Risk Agent</text>
    <text x="348" y="544" class="body">5 min</text>
    <text x="348" y="564" class="body">Halt enforcement</text>

    <rect x="478" y="466" width="126" height="128" rx="20" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.30)"/>
    <text x="500" y="521" class="label">CTO Agent</text>
    <text x="500" y="544" class="body">60 min</text>
    <text x="500" y="566" class="body">Posture + capital</text>

    <rect x="172" y="614" width="180" height="82" rx="18" fill="rgba(234,179,8,0.10)" stroke="rgba(234,179,8,0.26)"/>
    <text x="196" y="648" class="label">Strategy Manager</text>
    <text x="196" y="671" class="body">Promote / demote / retire</text>

    <rect x="374" y="614" width="188" height="82" rx="18" fill="rgba(168,85,247,0.10)" stroke="rgba(168,85,247,0.26)"/>
    <text x="406" y="648" class="label">Auditor</text>
    <text x="406" y="671" class="body">Daily reports + traceability</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="674" y="360" width="454" height="362" rx="28" fill="url(#panel)" stroke="rgba(6,182,212,0.20)"/>
    <text x="710" y="406" class="section">DARWIN Core</text>
    <text x="710" y="434" class="body">This is where governance becomes action: state classification,</text>
    <text x="710" y="454" class="body">capital policy, breakers, and strategy memory.</text>

    <rect x="710" y="484" width="180" height="90" rx="18" fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.26)"/>
    <text x="738" y="520" class="label">State Recognizer</text>
    <text x="738" y="543" class="body">Oscillation / Trend / Extreme</text>
    <text x="738" y="563" class="body">With confirmation buffer</text>

    <rect x="908" y="484" width="184" height="90" rx="18" fill="rgba(6,182,212,0.10)" stroke="rgba(6,182,212,0.26)"/>
    <text x="934" y="520" class="label">Capital Allocator</text>
    <text x="934" y="543" class="body">Weighted scores + volatility</text>
    <text x="934" y="563" class="body">Correlation discounts</text>

    <rect x="710" y="604" width="180" height="84" rx="18" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.26)"/>
    <text x="742" y="638" class="label">Circuit Breaker</text>
    <text x="742" y="661" class="body">T1 to T4 hard gates</text>

    <rect x="908" y="604" width="184" height="84" rx="18" fill="rgba(168,85,247,0.10)" stroke="rgba(168,85,247,0.26)"/>
    <text x="940" y="638" class="label">Strategy Archive</text>
    <text x="940" y="661" class="body">Templates, instances, history</text>

    <rect x="754" y="682" width="290" height="44" rx="22" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)"/>
    <text x="790" y="709" class="small">HTTP Bridge binds agents, UI, and execution</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1164" y="360" width="316" height="362" rx="28" fill="url(#panel)" stroke="rgba(34,197,94,0.20)"/>
    <text x="1200" y="406" class="section">OKX Agent Trade Kit</text>
    <text x="1200" y="434" class="body">Real account state and execution boundary.</text>
    <text x="1200" y="454" class="body">Local keys stay local.</text>

    <rect x="1200" y="486" width="244" height="84" rx="18" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.26)"/>
    <text x="1228" y="520" class="label">Market Data</text>
    <text x="1228" y="543" class="body">Candles, depth, funding, open interest</text>

    <rect x="1200" y="588" width="244" height="84" rx="18" fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.26)"/>
    <text x="1228" y="622" class="label">Account &amp; Positions</text>
    <text x="1228" y="645" class="body">Equity, balances, leverage, inventory</text>

    <rect x="1200" y="690" width="244" height="84" rx="18" fill="rgba(249,115,22,0.10)" stroke="rgba(249,115,22,0.26)"/>
    <text x="1228" y="724" class="label">Execution Surface</text>
    <text x="1228" y="747" class="body">Spot, swap, bots, algo orders, exits</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="812" width="1360" height="184" rx="28" fill="rgba(2,6,23,0.52)" stroke="rgba(255,255,255,0.08)"/>
    <text x="156" y="854" class="section">End-to-End Operating Loop</text>
    <text x="156" y="882" class="body">DARWIN is persuasive because every action stays on one</text>
    <text x="156" y="902" class="body">accountable rail instead of being split across separate tools.</text>

    <rect x="156" y="928" width="184" height="36" rx="18" fill="rgba(6,182,212,0.16)"/><text x="186" y="951" class="chip">1. Sense the market</text>
    <rect x="360" y="928" width="206" height="36" rx="18" fill="rgba(59,130,246,0.16)"/><text x="390" y="951" class="chip">2. Classify regime</text>
    <rect x="586" y="928" width="230" height="36" rx="18" fill="rgba(168,85,247,0.16)"/><text x="616" y="951" class="chip">3. Allocate posture</text>
    <rect x="836" y="928" width="218" height="36" rx="18" fill="rgba(34,197,94,0.16)"/><text x="866" y="951" class="chip">4. Execute on OKX</text>
    <rect x="1074" y="928" width="188" height="36" rx="18" fill="rgba(239,68,68,0.16)"/><text x="1104" y="951" class="chip">5. Enforce halts</text>
    <rect x="1282" y="928" width="162" height="36" rx="18" fill="rgba(234,179,8,0.16)"/><text x="1312" y="951" class="chip">6. Audit daily</text>
  </g>

  <path d="M650 286V342" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M958 286V342" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1290 286V342" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M604 530H674" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M640 656H710" stroke="#EF4444" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1128 530H1164" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1128 646H1164" stroke="#EF4444" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1322 778V812" stroke="#34D399" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M899 726V812" stroke="#06B6D4" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M468 696V812" stroke="#A855F7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
